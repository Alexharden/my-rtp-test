name: RTP-Auto-Test  # 生產線的名字

on: [push]  # 只要有人上傳程式碼 (Push)，就啟動

jobs:
  run-test:
    runs-on: ubuntu-latest  # 借用一台 Linux 虛擬機來跑
    steps:
      - name: 1. 取得程式碼
        uses: actions/checkout@v3

      - name: 2. 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: 3. 執行 RTP 模擬測試
        run: python rtp_test.py
