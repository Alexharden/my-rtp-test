name: RTP-Docker-Test

on: [push]

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 取得程式碼
        uses: actions/checkout@v3

      - name: 2. 組裝 Docker 貨櫃 (Build Image)
        run: docker build -t my-rtp-image .

      - name: 3. 在貨櫃中執行測試 (Run Container)
        run: docker run my-rtp-image
        
      - name: 4. 儲存測試報告
        uses: actions/upload-artifact@v4
        with:
          name: rtp-report  # 下載時的資料夾名稱
          path: test_report.txt # 要抓哪個檔案
