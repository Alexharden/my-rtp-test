name: Web-Google-Search-Test

on: [push] # 只要 Push 就觸發

jobs:
  google-search-job:
    runs-on: ubuntu-latest # 使用 GitHub 提供的 Linux 環境
    steps:
      - name: 1. 取得程式碼
        uses: actions/checkout@v3

      - name: 2. 執行 Google 搜尋自動化
        run: |
          # 安裝 Playwright (新一代自動化工具)
          pip install playwright
          playwright install chromium --with-deps
          
          # 跑一個進階的 Python 腳本去互動
          python -c "
          from playwright.sync_api import sync_playwright
          import time # 引入時間套件，為了等一下讓它看起來自然一點

          with sync_playwright() as p:
              # 啟動瀏覽器 (雖然是無頭，但我們模擬真實行為)
              browser = p.chromium.launch()
              
              # 模擬 H5 手機版 (iPhone 14)
              iphone = p.devices['iPhone 14']
              context = browser.new_context(**iphone)
              page = context.new_page()
              
              print('Step 1: 正在開啟 Google 首頁...')
              page.goto('https://www.google.com') 
              
              # 關鍵進階步驟：互動
              print('Step 2: 找到搜尋框，輸入關鍵字...')
              # 在手機版 Google 上，搜尋框通常名為 'Search'
              # 我們用 HTML 的 selector 屬性找到它 (name='q' 是經典作法)
              search_bar = page.locator('name=q')
              search_bar.fill('Playwright automated testing')
              
              print('Step 3: 按下 Enter...')
              # 模擬按下鍵盤的 Enter 鍵
              page.press('name=q', 'Enter')
              
              # 【專業技巧】等待網頁跳轉與搜尋結果載入
              print('Step 4: 等待搜尋結果載入完成...')
              # 告訴小精靈：等搜尋結果頁面的網址出現 'search' 字樣為止
              page.wait_for_url('**/search*')
              # 有時候網頁需要時間渲染，我們多等 1 秒確保圖片都跑出來
              time.sleep(1) 
              
              print('Step 5: 正在截取搜尋結果畫面...')
              page.screenshot(path='google_search_results.png')
              print('✅ 自動化搜尋測試完成！')
              browser.close()
          "

      - name: 3. 儲存搜尋結果截圖
        uses: actions/upload-artifact@v4
        with:
          name: google-search-report
          path: google_search_results.png
